# CI for fauxx-desktop. Compatible with GitHub Actions and Gitea/Forgejo
# Actions. Lanes:
#   - fmt / clippy / test       : the default (headless) build, GUI off
#   - feature-leak-guard        : proves no GUI/system-lib crate is in the
#                                 default graph (the headless invariant)
#   - gui                       : builds the desktop crate with `gui` ON
#   - deny                      : supply-chain policy (advisories/bans/licenses)
#   - invariants                : project invariant grep-checks
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_INCREMENTAL: 0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy (default / headless)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test (default / headless)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  feature-leak-guard:
    name: feature-leak guard (no GUI deps in default build)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
      - name: assert no GUI/windowing crate in the default graph
        run: |
          if cargo tree -e features | grep -Ei '(^|[ |`-])(iced|tray-icon|winit|wgpu|rfd)( |$|v)'; then
            echo "::error::a GUI/windowing crate leaked into the default build graph"
            exit 1
          fi

  gui:
    name: cargo build + clippy (gui feature ON)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # GUI build deps on Linux: iced/winit need libxkbcommon + wayland; the
      # keystore's dbus-secret-service needs libdbus + pkg-config. The Linux tray
      # is `ksni` (pure-Rust StatusNotifierItem over zbus), so NO GTK3 / xdotool /
      # appindicator system libraries are needed: tray-icon (which would pull
      # them) is the Windows/macOS-only backend.
      - name: install GUI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libdbus-1-dev pkg-config
      - run: cargo clippy -p fauxx-desktop --features gui --all-targets -- -D warnings
      # clippy type-checks but does not link; a real build catches link-time
      # failures (e.g. a missing -lxdo) that clippy alone would miss.
      - run: cargo build -p fauxx-desktop --features gui

  deny:
    name: cargo deny
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  invariants:
    name: invariant grep-checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: ./ci/check-invariants.sh

  live-gpc:
    name: live GPC (Chromium decoy emit + honoring detection, C3 #18)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      # A real browser to exercise the GPC live paths the unit tests cannot:
      # the decoy emitting Sec-GPC:1 + navigator.globalPrivacyControl (AC1) and
      # parsing a site's /.well-known/gpc.json honoring flag (AC2). Both run
      # against a self-contained 127.0.0.1 loopback server, so this lane needs a
      # browser but NO external network (unlike the network/Tor live tests, which
      # stay `#[ignore]`d and are not run here).
      - name: install Chromium
        id: chromium
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      # setup-chrome ships chrome-sandbox without the setuid-root bit the Linux
      # SUID sandbox requires, so Chromium aborts ("not configured correctly")
      # even with --no-sandbox. Configure the helper as the error itself directs
      # (owned by root, mode 4755) so the browser launches.
      - name: configure the Chromium SUID sandbox helper
        run: |
          sandbox="$(dirname "${{ steps.chromium.outputs.chrome-path }}")/chrome-sandbox"
          if [ -f "$sandbox" ]; then
            sudo chown root:root "$sandbox"
            sudo chmod 4755 "$sandbox"
          fi
      - name: run the GPC live tests against Chromium
        env:
          FAUXX_TEST_CHROMIUM: ${{ steps.chromium.outputs.chrome-path }}
        run: cargo test -p fauxx-core --test live_gpc -- --ignored --nocapture
