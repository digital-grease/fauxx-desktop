# CI for fauxx-desktop. Compatible with GitHub Actions and Gitea/Forgejo
# Actions. Lanes:
#   - fmt / clippy              : format + lint the default (headless) build
#   - test                      : cargo test --workspace on Linux, macOS, AND
#                                 Windows (matrix), so platform-specific bugs fail
#                                 CI on a plain commit, not only at release time
#   - feature-leak-guard        : proves no GUI/system-lib crate is in the
#                                 default graph (the headless invariant)
#   - gui                       : build + test the desktop crate with `gui` ON
#                                 across Linux/macOS/Windows (matrix)
#   - deny                      : supply-chain policy (advisories/bans/licenses)
#   - invariants                : project invariant grep-checks
#   - live-gpc                  : Chromium GPC live tests (decoy emit + honoring)
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  # Weekly run: exercises the slow lanes (mutation testing) and re-checks the
  # full matrix + supply chain against upstream drift even with no new commits.
  schedule:
    - cron: "0 6 * * 1"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_INCREMENTAL: 0

# Least-privilege default for every job: read-only checkout. No CI lane writes
# to the repo (artifact uploads use the artifacts API, not `contents`), so this
# read-only token is sufficient and satisfies the workflow-permissions hardening.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy (default / headless)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test (headless, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      # openssl-src (via rusqlite's vendored-sqlcipher OpenSSL) builds OpenSSL from
      # source and needs a full Perl; on Windows the Git-bash MSYS perl is missing
      # modules, so point it at the preinstalled Strawberry Perl. Windows-only: the
      # path does not exist on Linux/macOS, which use their system perl.
      - name: Use Strawberry Perl for openssl-src (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo 'OPENSSL_SRC_PERL=C:/Strawberry/perl/bin/perl.exe' >> "$GITHUB_ENV"
      - run: cargo test --workspace

  feature-leak-guard:
    name: feature-leak guard (no GUI deps in default build)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
      - name: assert no GUI/windowing crate in the default graph
        run: |
          if cargo tree -e features | grep -Ei '(^|[ |`-])(iced|tray-icon|winit|wgpu|rfd)( |$|v)'; then
            echo "::error::a GUI/windowing crate leaked into the default build graph"
            exit 1
          fi

  gui:
    name: gui build + test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Use Strawberry Perl for openssl-src (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo 'OPENSSL_SRC_PERL=C:/Strawberry/perl/bin/perl.exe' >> "$GITHUB_ENV"
      # GUI build deps on Linux: iced/winit need libxkbcommon + wayland; the
      # keystore's dbus-secret-service needs libdbus + pkg-config; xvfb gives a
      # headless display for any test that initializes a window. The Linux tray is
      # `ksni` (pure-Rust), so NO GTK3 / appindicator libs are needed. macOS and
      # Windows use their system frameworks (no apt step).
      - name: install GUI build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libdbus-1-dev pkg-config xvfb
      # Lint the GUI graph once on Linux; the per-OS build+test legs below catch
      # platform-specific compile errors (e.g. a cfg(windows) tray bug).
      - name: clippy (gui, Linux)
        if: runner.os == 'Linux'
        run: cargo clippy -p fauxx-desktop --features gui --all-targets -- -D warnings
      # Build + run the desktop crate tests with the GUI feature on EVERY OS so a
      # cfg(windows)/cfg(macos) tray or windowing bug fails CI on a plain commit,
      # not only at release time. Linux wraps the run in xvfb for any test that
      # needs a window surface. (This subsumes the old windows-only cargo-check.)
      - name: gui build + test (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a cargo test -p fauxx-desktop --features gui
      - name: gui build + test (macOS / Windows)
        if: runner.os != 'Linux'
        run: cargo test -p fauxx-desktop --features gui

  deny:
    name: cargo deny
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  invariants:
    name: invariant grep-checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: ./ci/check-invariants.sh

  docs:
    name: cargo doc (no broken intra-doc links)
    runs-on: ubuntu-24.04
    env:
      # Promote every rustdoc lint (chiefly broken/private intra-doc links) to an
      # error so a doc reference that no longer resolves fails CI.
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps

  live-gpc:
    name: live GPC (Chromium decoy emit + honoring detection, C3 #18)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      # A real browser to exercise the GPC live paths the unit tests cannot:
      # the decoy emitting Sec-GPC:1 + navigator.globalPrivacyControl (AC1) and
      # parsing a site's /.well-known/gpc.json honoring flag (AC2). Both run
      # against a self-contained 127.0.0.1 loopback server, so this lane needs a
      # browser but NO external network (unlike the network/Tor live tests, which
      # stay `#[ignore]`d and are not run here).
      - name: install Chromium
        id: chromium
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      # setup-chrome ships chrome-sandbox without the setuid-root bit the Linux
      # SUID sandbox requires, so Chromium aborts ("not configured correctly")
      # even with --no-sandbox. Configure the helper as the error itself directs
      # (owned by root, mode 4755) so the browser launches.
      - name: configure the Chromium SUID sandbox helper
        run: |
          sandbox="$(dirname "${{ steps.chromium.outputs.chrome-path }}")/chrome-sandbox"
          if [ -f "$sandbox" ]; then
            sudo chown root:root "$sandbox"
            sudo chmod 4755 "$sandbox"
          fi
      - name: run the GPC live tests against Chromium
        env:
          FAUXX_TEST_CHROMIUM: ${{ steps.chromium.outputs.chrome-path }}
        run: cargo test -p fauxx-core --test live_gpc -- --ignored --nocapture

  live-browser:
    name: live browser (Chromium isolated-profile decoy, C2 #11)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      - name: install Chromium
        id: chromium
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      # live_browser.rs looks for the system Chromium at /usr/bin/chromium and
      # falls back to a local data: URL when the network is down, so it needs a
      # browser but no external network. Symlink the installed binary to the path
      # the test expects, and fix the SUID sandbox helper like the live-gpc lane.
      - name: link Chromium + configure the SUID sandbox helper
        run: |
          chrome_path="${{ steps.chromium.outputs.chrome-path }}"
          sudo ln -sf "$chrome_path" /usr/bin/chromium
          sandbox="$(dirname "$chrome_path")/chrome-sandbox"
          if [ -f "$sandbox" ]; then
            sudo chown root:root "$sandbox"
            sudo chmod 4755 "$sandbox"
          fi
      # Runs the isolated-profile launch/navigate/dwell/clean-shutdown live test.
      # The Tor/SOCKS egress live tests in network_egress.rs stay `#[ignore]`d and
      # are NOT run here: they need a running Tor daemon and are exercised manually.
      - name: run the browser live tests against Chromium
        run: cargo test -p fauxx-core --test live_browser -- --ignored --nocapture

  golden-vectors:
    name: golden vectors (crypto + cross-device interop)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      # A named lane for the deterministic wire-contract vectors (the crypto_box
      # golden vector, the E13 cross-device interop vector, the pinned
      # fingerprints, and the protocol-constant drift asserts), so a contract
      # change fails an obvious check instead of a buried unit test.
      - run: cargo test -p fauxx-core --lib sync::crypto -- --nocapture

  extension-js:
    name: extension JS (eslint + node:test)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # Lint + unit-test the WebExtension's security-relevant pure logic (the
      # decoy guardrail blocklist and the native-messaging protocol framing).
      - name: install, lint, test
        working-directory: extension
        run: |
          npm ci
          npm run lint
          npm test

  mutants:
    name: cargo-mutants (scheduled)
    # Mutation testing is slow, so it runs only on the weekly schedule or a manual
    # dispatch, never on every push/PR. Surviving mutants are the backlog of
    # missing assertions; the lane is advisory (does not block).
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - name: mutate fauxx-core domain logic
        run: cargo mutants -p fauxx-core --timeout 120 || true
      - name: upload surviving-mutants report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-report
          path: mutants.out/
          if-no-files-found: ignore

  fuzz:
    name: cargo-fuzz (scheduled)
    # Coverage-guided fuzzing of the security-critical parsers (scrubber, sealed
    # sync frame, harmful-query blocklist). Nightly + libfuzzer, so it runs only
    # on the weekly schedule or a manual dispatch, never on every push/PR. A
    # crash fails the lane (a real bug); a clean smoke run passes. The fuzz crate
    # is the standalone `fuzz/` package (excluded from the workspace).
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: smoke-fuzz each target
        run: |
          for target in scrubber sync_frame blocklist; do
            echo "::group::fuzz $target"
            cargo +nightly fuzz run "$target" -- -max_total_time=120 -rss_limit_mb=4096
            echo "::endgroup::"
          done
      - name: upload any crash corpus
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/
          if-no-files-found: ignore

  all-green:
    name: all green (required check)
    # The single status check to require in branch protection: it passes only if
    # every required lane (across all matrix legs) succeeded. Mirrors the release
    # workflow's `announce` gate. Excludes the scheduled-only `mutants` lane.
    # Required = the deterministic lanes. The live-browser / live-gpc lanes (real
    # Chromium) and the advisory coverage lane still run and are visible, but are
    # kept out of the blocking gate so browser flakiness cannot block a merge.
    if: ${{ always() }}
    needs:
      - fmt
      - clippy
      - test
      - feature-leak-guard
      - gui
      - deny
      - invariants
      - docs
      - golden-vectors
      - extension-js
    runs-on: ubuntu-24.04
    steps:
      - name: verify all required lanes passed
        run: |
          results="${{ join(needs.*.result, ',') }}"
          echo "lane results: $results"
          case "$results" in
            *failure*|*cancelled*) echo "::error::a required CI lane failed"; exit 1 ;;
            *) echo "all required lanes passed" ;;
          esac

  coverage:
    name: coverage (llvm-cov, advisory)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      # Measure workspace coverage (default/headless graph). Advisory for now:
      # report + upload the lcov, no enforced floor until a baseline is known.
      - name: measure coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: upload coverage (lcov)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
