# Disable the empty "Open a blank issue" link so users land on a structured form.
# An "Other" Markdown fallback is still available for genuinely unusual issues.
blank_issues_enabled: false

# Links shown alongside the issue forms. Helps users self-resolve and routes
# conversational / speculative posts to Discussions instead of Issues.
contact_links:
  - name: FAQ (README)
    url: https://github.com/digital-grease/fauxx-desktop#faq
    about: Common questions and known issues (the GUI needs a display, authenticated proxies, the WebExtension native host, etc.)
  - name: Latest release & changelog
    url: https://github.com/digital-grease/fauxx-desktop/releases/latest
    about: If the bug you hit was already fixed in a newer version, that will save us both a round trip.
  - name: How Fauxx defends against profiling (Discussions)
    url: https://github.com/digital-grease/fauxx-desktop/discussions/categories/threat-models-and-privacy-theory
    about: For questions about how the decoy noise actually works, what attacker capabilities Fauxx assumes, or where it falls short. Better as a discussion than an issue.
  - name: Feature ideas & wishlist (Discussions)
    url: https://github.com/digital-grease/fauxx-desktop/discussions/categories/ideas
    about: Bigger-picture asks (new platforms, new surfaces) that are not ready to be a tracked enhancement. File an issue if it is a concrete, incremental change.
