name: Bug report
description: Something works incorrectly but the app did not crash (wrong output, broken control, UI glitch, etc.)
title: "Bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For a crash or a Rust panic (with a backtrace), please use the **Crash report** form instead, it has the right fields.

        Quick checks:
        - Is this already fixed in the latest version? See the [releases page](https://github.com/digital-grease/fauxx-desktop/releases).
        - Is your question answered by the [FAQ](https://github.com/digital-grease/fauxx-desktop#faq)?

  - type: dropdown
    id: os
    attributes:
      label: OS
      description: The auto-labeler reads this to tag the issue.
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS version
      placeholder: "Ubuntu 24.04 / macOS 15 / Windows 11"
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: Fauxx Desktop version
      description: From `fauxx --version`, or the release tag you installed.
      placeholder: 0.1.0
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Best guess of what part this affects. The auto-labeler reads this to tag the issue.
      options:
        - core
        - cli
        - gui
        - sync
        - browser
        - store
        - network
        - extension
        - packaging
        - other
    validations:
      required: false

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      placeholder: Describe what you saw.
    validations:
      required: true

  - type: textarea
    id: what_expected
    attributes:
      label: What did you expect to happen?
      placeholder: Describe what you expected instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can someone else reproduce this? Numbered steps are great. Include the exact CLI command if relevant.
      placeholder: |
        1. Run `fauxx ...`
        2. ...
        3. ...
    validations:
      required: false

  - type: textarea
    id: debug_log
    attributes:
      label: Debug log (scrubbed)
      description: |
        Strongly encouraged. Export a redacted copy of the debug log and drag the file in here:
        run `fauxx logs export` (CLI), or click **Export logs** in the desktop app.
        The export is scrubbed for sharing (user paths, IP/MAC addresses, emails, keys, ids,
        URLs, and persona/device/peer names are redacted), so it is safe to attach to a public
        issue. Review it first if you like.
      placeholder: Drag the exported fauxx-debug-log.txt file here.
    validations:
      required: false
