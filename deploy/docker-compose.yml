#
# Compose example for the Fauxx headless homelab mode (C8 #35). Builds the image
# from deploy/Dockerfile, runs `fauxx-cli serve` as the non-root container user, and
# persists the encrypted store + keys in a named volume. See `fauxx-cli serve --help`.
#
# Run from the repository root:
#   docker compose -f deploy/docker-compose.yml up -d --build

services:
  fauxx:
    build:
      # Build context is the repository root so the whole workspace is available
      # to the build stage.
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        # Set to "mqtt" to build with the Home Assistant bridge.
        FEATURES: ""
    image: fauxx-desktop:latest
    container_name: fauxx
    restart: on-failure
    environment:
      RUST_LOG: info
    volumes:
      # Durable home for the encrypted store, key file, and passphrase file.
      - fauxx-state:/var/lib/fauxx
      # The serve config (read-only). Copy deploy/serve.example.json and edit.
      - ./serve.json:/etc/fauxx/serve.json:ro
    # No inbound ports: the companion is 100% local and reaches out only for its
    # decoy work and (optionally) the LAN MQTT broker.

volumes:
  fauxx-state:
